<style>

const NPCDEF={
  mochi:{name:'Mochi',em:'🐱',type:'cat',color:0xf2b8c6,pos:[-11,10]},
  pip:{name:'Pip',em:'🐦',type:'bird',color:0x7ec8f0,pos:[-14,-9]},
  rocco:{name:'Rocco',em:'🦔',type:'hedgehog',color:0xb5895a,pos:[13,12]},
  // second village — Borgo di Coda
  nina:{name:'Nina',em:'🐱',type:'cat',color:0xd6b3f0,pos:[46,38]},
  aldo:{name:'Aldo',em:'🦔',type:'hedgehog',color:0xc79a5a,pos:[42,43]},
  sasha:{name:'Sasha',em:'🐦',type:'bird',color:0x8ce0a8,pos:[50,43]}
};
const QUESTS=[

    intro:["Ciao, che bello vederti! 🐱","Adoro i fiori 🌼 del villaggio.","Me ne raccogli 3?"],

    intro:["Cip cip! Ho una gran fame di pesce 🐟","Vai al laghetto e peschi 2 pesci per me?"],
    done:["Squisiti! Sei un campione 🎣"]},
  {npc:'rocco',type:'collect',item:'carota',amount:2,reward:35,
    intro:["Nell'orto vicino alla cuccia puoi coltivare 🥕","Pianta i semi, aspetta che crescano e portamene 2!"],

    intro:["Sto costruendo una nuova casetta 🔨","Mi raccogli 4 🪵 legna dagli alberi?"],
    done:["Legna robusta, ottimo lavoro! 🪚"]},
  {npc:'pip',type:'collect',item:'bacca',amount:3,reward:30,
    intro:["Che voglia di bacche 🫐!","Me ne raccogli 3 dai cespugli?"],

  {npc:'mochi',type:'collect',item:'gemma',amount:1,reward:55,

    done:["Che gioiello! Grazie di cuore 💖"]},
  {npc:'pip',type:'collect',item:'concime',amount:2,reward:34,

/* ================= STATE ================= */
const SAVEKEY='bl3d';
function defaultState(){return{coins:15,inv:{},seeds:2,quest:0,day:1,
  plots:[{x:1.5,z:8,stage:0,planted:-1},{x:3.4,z:8,stage:0,planted:-1},{x:5.3,z:8,stage:0,planted:-1}],
  outfits:{bucky:{hat:null,body:null},loki:{hat:null,body:null}},dug:{},placed:[],active:'bucky',
  food:0,needs:{hunger:80,energy:88,bladder:62},house:{level:1}};}
let S;
try{S=JSON.parse(localStorage.getItem(SAVEKEY))||defaultState();}catch(e){S=defaultState();}
// backfill
const d0=defaultState();for(const k in d0)if(S[k]===undefined)S[k]=d0[k];
function save(){try{localStorage.setItem(SAVEKEY,JSON.stringify(S));}catch(e){}}
function addInv(t,n){S.inv[t]=(S.inv[t]||0)+n;}
function have(t){return S.inv[t]||0;}

/* ================= AUDIO (procedural WebAudio) ================= */
let actx=null,master=null,musicOn=(S.sound!==false),musicTimer=null,mstep=0;
function initAudio(){if(actx)return;try{actx=new (window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=musicOn?0.6:0;master.connect(actx.destination);startMusic();}catch(e){}}
function tone(freq,dur,type,vol,when){if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.type=type||'triangle';o.frequency.value=freq;
  const t=when||actx.currentTime;g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(vol||0.2,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+0.03);}
function sfx(type){if(!actx||!musicOn)return;const t=actx.currentTime;
  if(type==='pick'){tone(660,0.12,'triangle',0.28,t);tone(880,0.12,'triangle',0.22,t+0.06);}
  else if(type==='coin'){tone(988,0.1,'square',0.2,t);tone(1319,0.16,'square',0.2,t+0.08);}
  else if(type==='fish'){tone(320,0.18,'sawtooth',0.16,t);tone(180,0.28,'sine',0.14,t+0.05);}
  else if(type==='plant'){tone(392,0.18,'sine',0.22,t);tone(523,0.16,'sine',0.16,t+0.08);}
  else if(type==='dig'){tone(150,0.2,'sawtooth',0.22,t);tone(110,0.24,'triangle',0.14,t+0.03);}
  else if(type==='quest'){[523,659,784,1047].forEach((f,i)=>tone(f,0.24,'triangle',0.24,t+i*0.1));}
  else if(type==='tap'){tone(520,0.07,'square',0.14,t);}}

function crossBlade(w,h){

  const p2=new T.PlaneGeometry(w,h,1,2).rotateY(Math.PI/2).translate(0,h/2,0).toNonIndexed();
  const cat=(a,b)=>{const m=new Float32Array(a.length+b.length);m.set(a);m.set(b,a.length);return m;};
  const g=new T.BufferGeometry();
  const pos=cat(p1.attributes.position.array,p2.attributes.position.array);
  g.setAttribute('position',new T.BufferAttribute(pos,3));
  g.setAttribute('normal',new T.BufferAttribute(cat(p1.attributes.normal.array,p2.attributes.normal.array),3));
  g.setAttribute('uv',new T.BufferAttribute(cat(p1.attributes.uv.array,p2.attributes.uv.array),2));

  for(let i=0;i<pos.length/3;i++){const f=Math.min(1,Math.max(0,pos[i*3+1]/h));const c=base.clone().lerp(tip,f*f);
    cols[i*3]=c.r;cols[i*3+1]=c.g;cols[i*3+2]=c.b;}
  g.setAttribute('color',new T.BufferAttribute(cols,3));return g;}

function makeDog(bandanaColor){const g=new T.Group();
  // Yorkshire-terrier palette: golden tan body & face, dark steel-blue saddle
  // silky Yorkie coat — softer sheen (lower roughness) for a glossy, realistic look
  const gold=new T.MeshStandardMaterial({color:0xcf9a56,roughness:0.68,flatShading:false});
  const goldL=new T.MeshStandardMaterial({color:0xe3ba78,roughness:0.64,flatShading:false});
  const steel=new T.MeshStandardMaterial({color:0x39424e,roughness:0.62,flatShading:false});
  const steelL=new T.MeshStandardMaterial({color:0x4c5763,roughness:0.6,flatShading:false});
  const noseM2=new T.MeshStandardMaterial({color:0x18130f,roughness:0.25,metalness:0.1});
  const eyeM=new T.MeshStandardMaterial({color:0x120f0c,roughness:0.25});
  const eyeW=new T.MeshStandardMaterial({color:0xffffff,roughness:0.2});
  const tongueM=new T.MeshStandardMaterial({color:0xe07d8a,roughness:0.6});
  const bandM=new T.MeshStandardMaterial({color:bandanaColor,roughness:0.55});
  // a thin, downward-hanging lock of the silky Yorkie coat (sways when animated)
  const fur=[];
  function tuft(x,y,z,len,mat,tiltX,tiltZ,parent,noanim){const t=new T.Mesh(new T.ConeGeometry(len*0.3,len,5),mat);
    t.position.set(x,y,z);const rz=tiltZ||0;t.rotation.set(Math.PI+(tiltX||0),Math.random()*0.5,rz);t.scale.set(1,1,0.45);t.castShadow=true;(parent||g).add(t);
    if(!noanim){t.userData={bz:rz,ph:Math.random()*6.28};fur.push(t);}return t;}
  // torso
  const body=new T.Mesh(new T.CapsuleGeometry(0.52,0.62,6,12),gold);body.rotation.x=Math.PI/2;body.position.set(0,1.32,0);body.scale.set(1,1,1.08);body.castShadow=true;body.receiveShadow=true;g.add(body);
  // dark steel saddle draping over the back
  const saddle=new T.Mesh(new T.SphereGeometry(0.56,14,12),steel);saddle.position.set(0,1.46,-0.02);saddle.scale.set(1.02,0.82,1.4);saddle.castShadow=true;g.add(saddle);
  const saddleL=new T.Mesh(new T.SphereGeometry(0.5,12,10),steelL);saddleL.position.set(0,1.62,0.05);saddleL.scale.set(0.9,0.5,1.2);g.add(saddleL);
  // small chest tuft only (no side skirt — clean body)
  for(let i=0;i<3;i++)tuft((i-1)*0.13,1.2,0.62,0.3,goldL,-0.5,(i-1)*0.06);
  // head
  const head=new T.Group();head.position.set(0,1.8,0.72);g.add(head);
  const skull=new T.Mesh(new T.SphereGeometry(0.47,16,14),goldL);skull.scale.set(1,0.98,1);skull.castShadow=true;head.add(skull);
  // muzzle
  const muzzle=new T.Mesh(new T.SphereGeometry(0.27,12,10),gold);muzzle.position.set(0,-0.16,0.4);muzzle.scale.set(1,0.82,1.15);muzzle.castShadow=true;head.add(muzzle);
  const noseM=new T.Mesh(new T.SphereGeometry(0.115,10,10),noseM2);noseM.position.set(0,-0.09,0.72);noseM.scale.set(1.2,0.9,1);head.add(noseM);
  const noseGl=new T.Mesh(new T.SphereGeometry(0.03,6,6),eyeW);noseGl.position.set(-0.04,-0.04,0.82);head.add(noseGl);
  const mouth=new T.Mesh(new T.BoxGeometry(0.16,0.03,0.12),noseM2);mouth.position.set(0,-0.28,0.55);head.add(mouth);
  const tongue=new T.Mesh(new T.SphereGeometry(0.07,8,8),tongueM);tongue.position.set(0,-0.32,0.6);tongue.scale.set(1,0.5,1.2);head.add(tongue);
  // eyes with highlight + gold brow tufts
  const earArr=[],eyeArr=[];
  for(const sx of[-1,1]){const eye=new T.Mesh(new T.SphereGeometry(0.1,12,12),eyeM);eye.position.set(sx*0.2,0.06,0.38);head.add(eye);eyeArr.push(eye);
    const gl=new T.Mesh(new T.SphereGeometry(0.028,6,6),eyeW);gl.position.set(sx*0.17,0.11,0.47);head.add(gl);
    // erect V ears (steel outside, tan inner)
    const earG=new T.Group();earG.position.set(sx*0.33,0.4,0.0);head.add(earG);earArr.push(earG);
    const ear=new T.Mesh(new T.ConeGeometry(0.15,0.5,4),steel);ear.position.set(0,0.1,0);ear.rotation.set(0.1,0.78,-sx*0.16);ear.castShadow=true;earG.add(ear);
    const earIn=new T.Mesh(new T.ConeGeometry(0.08,0.34,4),gold);earIn.position.set(0,0.07,0.04);earIn.rotation.set(0.1,0.78,-sx*0.16);earG.add(earIn);}
  // small beard/mustache under the muzzle (hangs down, not sideways)
  for(let i=0;i<3;i++)tuft((i-1)*0.12,-0.34,0.5,0.24,goldL,0.6,0,head);
  // top-knot with a little bow
  const knot=new T.Mesh(new T.SphereGeometry(0.13,10,10),goldL);knot.position.set(0,0.46,0.12);head.add(knot);
  const bow=new T.Mesh(new T.TorusGeometry(0.08,0.045,8,12),bandM);bow.position.set(0,0.52,0.12);bow.rotation.y=Math.PI/2;head.add(bow);
  // neck bandana
  const band=new T.Mesh(new T.TorusGeometry(0.44,0.12,10,18),bandM);band.position.set(0,1.42,0.36);band.rotation.x=Math.PI/2.3;band.scale.set(1,1,0.7);band.castShadow=true;g.add(band);
  const bknot=new T.Mesh(new T.ConeGeometry(0.15,0.3,7),bandM);bknot.position.set(0,1.2,0.56);bknot.rotation.x=1.1;g.add(bknot);
  // legs with feathering + paws
  const legs=[];const legGeo=new T.CylinderGeometry(0.16,0.13,1.0,8);
  for(const p of[[-0.32,0.42],[0.32,0.42],[-0.32,-0.42],[0.32,-0.42]]){const pivot=new T.Group();pivot.position.set(p[0],1.0,p[1]);
    const leg=new T.Mesh(legGeo,gold);leg.position.y=-0.5;leg.castShadow=true;
    tuft(0,-0.1,0.06,0.28,goldL,0.15,0,leg);
    const paw=new T.Mesh(new T.SphereGeometry(0.18,10,9),steel);paw.position.y=-0.52;paw.scale.set(1,0.66,1.25);leg.add(paw);
    // little toe separations for a more realistic paw
    for(const tx of[-0.08,0,0.08]){const toe=new T.Mesh(new T.SphereGeometry(0.05,7,6),steelL);toe.position.set(tx,-0.55,0.12);leg.add(toe);}
    pivot.add(leg);g.add(pivot);legs.push(pivot);}
  // plumed upright tail
  const tail=new T.Group();tail.position.set(0,1.5,-0.56);g.add(tail);
  const tailM=new T.Mesh(new T.CapsuleGeometry(0.12,0.42,6,10),steel);tailM.geometry.translate(0,0.32,0);tail.add(tailM);
  tuft(0,0.62,0,0.34,steelL,0,0,tail);tuft(0.12,0.52,0,0.3,goldL,0,0.35,tail);tuft(-0.12,0.52,0,0.3,goldL,0,-0.35,tail);
  tuft(0.06,0.68,-0.05,0.28,steel,0,0.15,tail);tuft(-0.06,0.68,-0.05,0.28,steel,0,-0.15,tail);tuft(0,0.42,0.05,0.34,goldL,0.3,0,tail);
  tail.rotation.x=0.5;
  g.scale.setScalar(0.85);
  return {group:g,legs,tail,head,body,hat:null,tongue,ears:earArr,eyes:eyeArr,fur,seed:Math.random()*6.28};}

function inLake(x,z){return Math.hypot(x-LAKE.x,z-LAKE.z)<LAKE.r+4;}

/* ---- walkable multi-level terrain (Pokopia-style plateau + ramp) ---- */
const PLAT={x0:22,x1:38,z0:10,z1:28,h:3.0};
const RAMP={x0:27,x1:33,z0:3.5,z1:10.2,h0:0,h1:3.0};
const PLAT2={x0:22,x1:38,z0:33,z1:47,h:3.0};                 // second plateau
const SUSP={x0:27.5,x1:32.5,z0:27.9,z1:33.1,h:3.0};          // rope bridge span between them
const BRIDGE={x:LAKE.x-5,hw:1.4,z0:LAKE.z-LAKE.r-2,z1:LAKE.z+LAKE.r+2,h:0.45};
function onBridge(x,z){return x>BRIDGE.x-BRIDGE.hw&&x<BRIDGE.x+BRIDGE.hw&&z>BRIDGE.z0&&z<BRIDGE.z1;}
function onSusp(x,z){return x>SUSP.x0&&x<SUSP.x1&&z>SUSP.z0&&z<SUSP.z1;}
function onRaised(x,z){return x>PLAT.x0-1&&x<PLAT.x1+1&&z>RAMP.z0-1&&z<PLAT2.z1+1;}
function groundHeight(x,z){let h=0;
  if(x>=RAMP.x0&&x<=RAMP.x1&&z>=RAMP.z0&&z<=RAMP.z1){const t=(z-RAMP.z0)/(RAMP.z1-RAMP.z0);h=Math.max(h,RAMP.h0+(RAMP.h1-RAMP.h0)*t);}
  if(x>=PLAT.x0&&x<=PLAT.x1&&z>=PLAT.z0&&z<=PLAT.z1)h=Math.max(h,PLAT.h);
  if(x>=PLAT2.x0&&x<=PLAT2.x1&&z>=PLAT2.z0&&z<=PLAT2.z1)h=Math.max(h,PLAT2.h);
  if(onSusp(x,z))h=Math.max(h,SUSP.h);
  if(onBridge(x,z))h=Math.max(h,BRIDGE.h);
  return h;}
// plateau geometry: brick retaining block + grass cap
{const pw=PLAT.x1-PLAT.x0,pd=PLAT.z1-PLAT.z0,pcx=(PLAT.x0+PLAT.x1)/2,pcz=(PLAT.z0+PLAT.z1)/2;

let near=null;
function detectNear(){near=null;let best=3.4;
  if(inside){const pd=Math.hypot(player.x-INT.x,player.z-(INT.z+INT.hw-0.7));near=pd<1.7?{type:'exit'}:null;
    const act=$('act');act.disabled=!near;act.textContent=near?'🚪':'🏠';return;}
  if(removeMode){best=3;for(const o of placedObjs){const d=Math.hypot(player.x-o.p.x,player.z-o.p.z);if(d<best){best=d;near={type:'remove',obj:o};}}
    const act=$('act');act.disabled=!near;act.textContent=near?'🗑️':'👀';return;}
  for(const o of interactables){const d=Math.hypot(player.x-o.x,player.z-o.z);if(d<best){best=d;near=o;}}
  // fishing near lake shore
  const dl=Math.hypot(player.x-LAKE.x,player.z-LAKE.z);
  if(!near&&dl>LAKE.r-1&&dl<LAKE.r+4){near={type:'fish'};}
  // needs to go: prompt to relieve on open grass when bladder is low
  if(!near&&S.needs.bladder<26){near={type:'poop'};}
  const act=$('act');
  if(fishing){act.disabled=false;act.textContent='🎣';return;}
  act.disabled=!near;
  act.textContent=!near?'👀':near.type==='npc'?'💬':near.type==='flower'?'✋':near.type==='fish'?'🎣':
    near.type==='bush'?'🫐':near.type==='tree'?'🪵':near.type==='dig'?'⛏️':
    near.type==='bowl'?'🍖':near.type==='sleep'?'😴':near.type==='poop'?'💩':near.type==='clean'?'🧹':
    near.type==='shop'?near.em:near.type==='door'?'🚪':near.type==='plot'?((S.plots[near.idx].stage||0)>=3?'🌾':'🌱'):'👀';}

function doAction(){
  if(dialogue){advanceDialogue();return;}
  if(fishing){fishPull();return;}
  if(!near)return;
  if(near.type==='exit'){exitInterior();return;}
  if(near.type==='door'){enterInterior();return;}
  if(near.type==='remove'){removePlaced(near.obj);return;}
  if(near.type==='flower'){addInv('fiore',1);toast('+1 🌼 Fiore');burst(near.x,0.5,near.z,0xffd23f,14);sfx('pick');scene.remove(near.mesh);interactables.splice(interactables.indexOf(near),1);after();}
  else if(near.type==='bush'){if(near.cd>Date.now()){toast('🫐 Ancora acerbo…');return;}near.cd=Date.now()+12000;addInv('bacca',1);toast('+1 🫐 Bacca');burst(near.x,0.8,near.z,0x5aa9ff,12);sfx('pick');after();}
  else if(near.type==='tree'){if(near.cd>Date.now()){toast('🌿 Niente per ora…');return;}near.cd=Date.now()+12000;addInv('legno',1);toast('+1 🪵 Legna');burst(near.x,1.3,near.z,0x8fce6b,12);sfx('pick');after();}
  else if(near.type==='dig'){if(S.dug[near.id]&&S.dug[near.id]>Date.now()){toast('⛏️ Già scavato qui');return;}S.dug[near.id]=Date.now()+60000;
    const g=Math.random()<0.5;addInv(g?'gemma':'carota',1);toast('+1 '+(g?'💎 Gemma':'🥕 Carota'));burst(near.x,0.4,near.z,g?0x8fd0ff:0xff8a3d,16);sfx('dig');after();}
  else if(near.type==='npc')talkNPC(near.id);
  else if(near.type==='shop')openSheet(near.tab);
  else if(near.type==='fish')startFishing();
  else if(near.type==='plot')usePlot(near.idx);
  else if(near.type==='bowl')feedDog();
  else if(near.type==='sleep')sleepDog();
  else if(near.type==='poop')doPoop();
  else if(near.type==='clean')cleanPoop(near);
}

function makePoopMesh(){const g=new T.Group();const m=new T.MeshStandardMaterial({color:0x6b4a2b,roughness:.85});

const placedObjs=[];
function spawnPlaced(p){const def=BUILD[p.k];if(!def)return null;const m=def.make();
  m.position.set(p.x,groundHeight(p.x,p.z)+(def.yoff||0),p.z);m.rotation.y=p.rot||0;scene.add(m);
  let col=null;if(def.col){col={x:p.x,z:p.z,r:def.col};colliders.push(col);}
  placedObjs.push({p,mesh:m,col});return m;}
(S.placed||[]).forEach(spawnPlaced);

function removePlaced(o){scene.remove(o.mesh);const i=placedObjs.indexOf(o);if(i>=0)placedObjs.splice(i,1);
  const si=S.placed.indexOf(o.p);if(si>=0)S.placed.splice(si,1);
  if(o.col){const ci=colliders.indexOf(o.col);if(ci>=0)colliders.splice(ci,1);}
  const refund=Math.floor((BUILD[o.p.k].cost||0)*0.5);S.coins+=refund;
  burst(o.p.x,0.4,o.p.z,0xe05555,12);sfx('dig');toast('🗑️ Rimosso (+🦴'+refund+')');updateHUD();save();}

  for(const k in BUILD){const d=BUILD[k],can=S.coins>=d.cost;h+=`<div class="slot" style="cursor:pointer;${can?'':'opacity:.45'}" onclick="__blBuild('${k}')"><div class="em">${d.em}</div><div class="nm">${d.name}</div><div class="ct">🦴${d.cost}</div></div>`;}

function startPlace(k){cancelPlace();if(removeMode){removeMode=false;if(removeHi)removeHi.visible=false;}
  $('pOk').style.display='';$('pRot').style.display='';$('pNo').textContent='✗';
  const def=BUILD[k];const ghost=def.make();
  ghost.traverse(o=>{if(o.isMesh){o.material=o.material.clone();o.material.transparent=true;o.material.opacity=0.55;o.castShadow=false;}});
  const ring=new T.Mesh(new T.CircleGeometry((def.col||0.8)+0.3,22),new T.MeshBasicMaterial({color:0x4bbf5a,transparent:true,opacity:0.5,side:T.DoubleSide}));ring.rotation.x=-Math.PI/2;
  scene.add(ghost);scene.add(ring);placeMode={k,ghost,ring,rot:0,valid:false};
  $('placeBar').classList.add('on');$('act').style.display='none';}
function updatePlace(){if(!placeMode)return;const def=BUILD[placeMode.k];
  const fx=player.x+Math.sin(player.dir)*2.6,fz=player.z+Math.cos(player.dir)*2.6,gy=groundHeight(fx,fz);
  const valid=inside?(Math.abs(fx-INT.x)<INT.hw-0.7&&Math.abs(fz-INT.z)<INT.hw-0.7):(Math.abs(fx)<BOUND&&Math.abs(fz)<BOUND&&!inLake(fx,fz)&&!onBridge(fx,fz));placeMode.valid=valid;
  placeMode.ghost.position.set(fx,gy+(def.yoff||0),fz);placeMode.ghost.rotation.y=placeMode.rot;
  placeMode.ring.position.set(fx,gy+0.06,fz);placeMode.ring.material.color.setHex(valid?0x4bbf5a:0xe05555);}

  const def=BUILD[placeMode.k],fx=placeMode.ghost.position.x,fz=placeMode.ghost.position.z;
  if(S.coins<def.cost){toast('Servono più ossa 🦴');cancelPlace();return;}
  S.coins-=def.cost;const p={k:placeMode.k,x:fx,z:fz,rot:placeMode.rot};S.placed.push(p);spawnPlaced(p);
  burst(fx,0.4,fz,0x8ed86a,10);sfx('plant');toast(def.em+' posizionato!');updateHUD();save();
  const k=placeMode.k;cancelPlace();if(S.coins>=BUILD[k].cost)startPlace(k);}

let clock=0.28,prevClock=0.28;const CYCLE=150;
function updateSky(dt){prevClock=clock;clock=(clock+dt/CYCLE)%1;
  if(clock<prevClock){S.day++;growPlots();pickWeather();save();}
  const wet=weather==='pioggia'?1:weather==='nuvoloso'?0.5:0;
  const ang=(clock-0.25)*6.283,elev=Math.sin(clock*Math.PI);
  const dayN=Math.max(0,Math.min(1,(clock>0.05&&clock<0.95)?Math.sin((clock-0.05)/0.9*Math.PI):0));
  sun.position.set(player.x+Math.cos(ang)*50,Math.max(6,elev*70+8),player.z+Math.sin(ang)*80);sun.target.position.set(player.x,0,player.z);
  sun.intensity=(0.25+dayN*1.95)*(1-wet*0.5);hemi.intensity=(0.55+dayN*0.85)*(1-wet*0.16);
  const dawn=Math.max(0,1-Math.abs(clock-0.5)*3.2);sun.color.setRGB(1,0.9+dawn*0.02,0.76+dawn*0.12);
  const sky=SKY_NIGHT.clone().lerp(SKY_DAY,dayN);if(dayN>0.02&&dayN<0.6&&!wet)sky.lerp(new T.Color(0xffb27a),(0.6-dayN)*0.5);
  if(wet)sky.lerp(GREY,wet*0.6);
  scene.background.copy(sky);scene.fog.color.copy(sky);scene.fog.far=150-(1-dayN)*40-wet*45;
  rainGroup.visible=(weather==='pioggia'&&!inside);
  const night=1-dayN;
  moon.intensity=night*0.55;moon.position.set(player.x-Math.cos(ang)*50,Math.max(4,-elev*60+40),player.z-Math.sin(ang)*70);
  moonMesh.position.set(player.x-Math.cos(ang)*120,60+(-elev)*40,player.z-140);moonMesh.visible=night>0.15;
  stars.material.opacity=Math.max(0,night*2-0.4);fireflies.material.opacity=Math.max(0,night*1.2-0.15);
  pollen.material.opacity=dayN*0.42*(1-wet);
  for(const l of nightPointLights){l.light.intensity=night*2.2;l.bulb.material.emissiveIntensity=night*1.4;}
  for(const wm of windowMats)wm.emissiveIntensity=night*1.1;
  if(water.material.uniforms&&water.material.uniforms.color)water.material.uniforms.color.value.setRGB(0.62-night*0.4,0.75-night*0.45,0.81-night*0.4);
  const wem=weather==='pioggia'?' 🌧️':weather==='nuvoloso'?' ☁️':'';
  $('tod').textContent=(dayN>0.55?'☀️ Giorno':dayN>0.15?'🌇 Tramonto':'🌙 Notte')+wem;}

function animateDog(d,a){d.group.position.set(a.x,a.y||0,a.z);d.group.rotation.y=a.dir;
  const sw=a.moving?Math.sin(a.walk)*0.5:0;d.legs[0].rotation.x=sw;d.legs[3].rotation.x=sw;d.legs[1].rotation.x=-sw;d.legs[2].rotation.x=-sw;
  d.tail.rotation.y=Math.sin(a.moving?a.walk*1.5:performance.now()/300)*0.5;
  d.group.position.y=(a.y||0)+(a.moving?Math.abs(Math.sin(a.walk))*0.08:Math.sin(performance.now()/650)*0.03);
  const now=performance.now(),s=d.seed||0;
  if(d.tongue){const p=Math.sin(now/150+s);d.tongue.position.y=-0.32+p*0.02;d.tongue.scale.set(1,0.5,1.2+Math.max(0,p)*0.55);}
  if(d.ears){const tw=Math.sin(now/850+s),t2=((now/1000+s)%4)<0.2?Math.sin(now/55)*0.22:0;d.ears[0].rotation.z=tw*0.05+t2;d.ears[1].rotation.z=-tw*0.05-t2;}
  if(d.eyes){const b=((now+s*400)%3200)<110?0.14:1;d.eyes[0].scale.y=b;d.eyes[1].scale.y=b;}
  if(d.fur){const amp=a.moving?0.17:0.06,sp=a.moving?a.walk*1.1:now/650+s;for(const f of d.fur){f.rotation.z=f.userData.bz+Math.sin(sp+f.userData.ph)*amp;}}
  // gentle breathing when idle
  if(d.body){const br=a.moving?0:Math.sin(now/900+s)*0.022;d.body.scale.set(1+br,1+br,1.08+br);}
  // eating pose: dip the muzzle to the bowl and wag happily
  if(d.eat&&now<d.eat){d.head.rotation.x=0.55+Math.sin(now/85)*0.14;d.tail.rotation.y=Math.sin(now/70)*0.8;}
  else d.head.rotation.x=0;
  // squat pose while relieving itself
  if(d.squat&&now<d.squat){d.group.position.y=(a.y||0)-0.14;}}
function blocked(x,z){
  if(inside){if(Math.abs(x-INT.x)>INT.hw-0.4||Math.abs(z-INT.z)>INT.hw-0.4)return true;
    for(const c of colliders)if(Math.hypot(x-c.x,z-c.z)<c.r)return true;return false;}
  if(Math.abs(x)>BOUND||Math.abs(z)>BOUND)return true;
  if(Math.hypot(x-LAKE.x,z-LAKE.z)<LAKE.r-1&&!onBridge(x,z))return true;
  for(const c of colliders)if(Math.hypot(x-c.x,z-c.z)<c.r)return true;return false;}
function moveActor(a,dx,dz){const h0=groundHeight(a.x,a.z);
  if(!blocked(a.x+dx,a.z)&&Math.abs(groundHeight(a.x+dx,a.z)-h0)<1.3)a.x+=dx;
  if(!blocked(a.x,a.z+dz)&&Math.abs(groundHeight(a.x,a.z+dz)-groundHeight(a.x,a.z))<1.3)a.z+=dz;
  a.y=groundHeight(a.x,a.z);}

const camTarget=new T.Vector3();let last=performance.now(),dustT=0;

function frame(now){try{const dt=Math.min((now-last)/1000,0.05);last=now;
  let ix=0,iz=0;if(!dialogue&&!sheet){
    if(keys['w']||keys['arrowup'])iz-=1;if(keys['s']||keys['arrowdown'])iz+=1;if(keys['a']||keys['arrowleft'])ix-=1;if(keys['d']||keys['arrowright'])ix+=1;
    if(joy.active){ix+=joy.dx;iz+=joy.dy;}}
  let mag=Math.hypot(ix,iz);if(mag>1){ix/=mag;iz/=mag;}player.moving=mag>0.08;
  if(player.moving){const sp=7*Math.min(mag,1)*dt;moveActor(player,ix*sp,iz*sp);player.dir=Math.atan2(ix,iz);player.walk+=dt*11*Math.min(mag,1)+dt*3;}
  trail.push({x:player.x,z:player.z});if(trail.length>24)trail.shift();
  const tg=trail[0]||player,cx=tg.x-comp.x,cz=tg.z-comp.z,cd=Math.hypot(cx,cz);comp.moving=cd>2.0;
  if(comp.moving){const step=Math.min(cd-1.8,7*dt);comp.x+=cx/cd*step;comp.z+=cz/cd*step;comp.dir=Math.atan2(cx,cz);comp.walk+=dt*11;}
  comp.y+=(groundHeight(comp.x,comp.z)-comp.y)*Math.min(1,dt*10);
  const[pd,cdog]=refs();animateDog(pd,player);animateDog(cdog,comp);
  // spin dig sparkles
  for(const o of interactables)if(o.type==='dig'&&o.spark){o.spark.rotation.y+=dt*2;o.spark.visible=!(S.dug[o.id]&&S.dug[o.id]>Date.now());}
  // npcs wander + quest markers bob & toggle
  updateNPCs(dt);updateAnimals(dt);updateNeeds(dt);
  for(const id in npcObjs){const m=npcObjs[id].userData.mark;const q=QUESTS[S.quest];
    m.visible=!!(q&&q.npc===id);m.position.y=2.1+Math.sin(now/300)*0.12;m.rotation.y+=dt*2;}
  // grass wind
  if(grassMat.userData.sh)grassMat.userData.sh.uniforms.uTime.value=now/1000;
  // drifting clouds
  for(const cl of clouds){cl.position.x+=cl.userData.spd*dt;if(cl.position.x>120)cl.position.x=-120;}
  // rain
  if(rainGroup.visible){rainGroup.position.set(player.x,0,player.z);for(const d of rainDrops){d.position.y-=22*dt;if(d.position.y<0){d.position.y=16;d.position.x=(Math.random()-0.5)*36;d.position.z=(Math.random()-0.5)*36;}}}
  // wet ground + puddles + ripples
  const wtarget=weather==='pioggia'?1:0;wetness+=(wtarget-wetness)*Math.min(1,dt*0.5);
  if(wetness>0.002){if(!pathBaseC)pathBaseC=pathMat.color.clone();
    ground.material.color.copy(groundBaseC).multiplyScalar(1-wetness*0.2);ground.material.roughness=1-wetness*0.5;
    hills.material.color.copy(hillsBaseC).multiplyScalar(1-wetness*0.2);
    pathMat.color.copy(pathBaseC).multiplyScalar(1-wetness*0.3);pathMat.roughness=1-wetness*0.55;
    puddleMat.opacity=wetness*0.72;}
  if(weather==='pioggia'){rippleT-=dt;if(rippleT<=0){rippleT=0.1;const rr=ripples.find(r=>!r.visible);
    if(rr){const rx=player.x+(Math.random()-0.5)*22,rz=player.z+(Math.random()-0.5)*22;rr.visible=true;rr.userData.life=0.9;rr.scale.setScalar(1);rr.position.set(rx,groundHeight(rx,rz)+0.04,rz);}}}
  for(const r of ripples){if(!r.visible)continue;r.userData.life-=dt;if(r.userData.life<=0){r.visible=false;continue;}const tt=1-r.userData.life/0.9;r.scale.setScalar(1+tt*4);r.material.opacity=(1-tt)*0.6;}
  // water skin glints
  skin.material.opacity=0.22+Math.sin(now/700)*0.05;
  // waterfalls: scroll the sheet + pulse splash ring
  for(const wf of waterfalls){wf.tex.offset.y=(wf.tex.offset.y-dt*0.9)%1;const ph=(now/650)%1;wf.ring.scale.setScalar(0.5+ph*2.4);wf.ring.material.opacity=0.5*(1-ph);}
  // fireflies drift
  const fp=fireflies.geometry.attributes.position;for(let i=0;i<ffN;i++){fp.array[i*3+1]=0.8+Math.sin(now/900+ffSeed[i])*0.5+1.0;}fp.needsUpdate=true;
  // pollen drifts gently and follows the camera area
  if(pollen.material.opacity>0.01){pollen.position.set(player.x,0,player.z);const pp=pollen.geometry.attributes.position;
    for(let i=0;i<poN;i++){pp.array[i*3]+=Math.sin(now/1600+poSeed[i])*dt*0.25;pp.array[i*3+1]+=Math.cos(now/2100+poSeed[i]*1.7)*dt*0.18;
      if(pp.array[i*3]>27)pp.array[i*3]=-27;else if(pp.array[i*3]<-27)pp.array[i*3]=27;}pp.needsUpdate=true;}
  // butterflies flutter
  for(const b of butterflies){b.ph+=dt*b.sp;
    b.bg.position.set(b.cx+Math.cos(b.ph)*b.r,1.2+Math.sin(b.ph*2.3)*0.45,b.cz+Math.sin(b.ph)*b.r);
    b.bg.rotation.y=-b.ph+Math.PI/2;const flap=Math.sin(now/45+b.ph*3)*0.95;b.pl.rotation.y=flap;b.pr.rotation.y=-flap;}
  // birds glide in wide arcs and flap
  for(const bd of birds){bd.ph+=dt*bd.sp;const bx=player.x+bd.cx+Math.cos(bd.ph)*bd.r,bz=player.z+bd.cz+Math.sin(bd.ph)*bd.r;
    bd.bg.position.set(bx,bd.h+Math.sin(bd.ph*1.5)*1.2,bz);bd.bg.rotation.y=-bd.ph;const bf=Math.sin(now/140+bd.ph*5)*0.7;bd.wl.rotation.x=bf;bd.wr.rotation.x=-bf;}
  // chimney smoke rising and fading
  for(const s of smokePuffs){s.ph=(s.ph+dt*0.13)%1;const t=s.ph;s.m.position.set(s.bx+Math.sin(t*6.28+s.by)*0.35,s.by+t*2.8,s.bz+Math.cos(t*5+s.by)*0.2);s.m.scale.setScalar(0.5+t*1.7);s.m.material.opacity=0.55*(1-t)*(1-t);}
  // particles + footstep dust
  updateParticles(dt);
  if(player.moving){dustT+=dt;if(dustT>0.17){dustT=0;burst(player.x,0.05,player.z,0xd8c49a,2,0.5,0.8);}}
  if(fishing&&bobber&&bobber.visible)bobber.position.y=0.18+(fishing.state==='bite'?Math.sin(now/70)*0.13-0.08:Math.sin(now/380)*0.05);
  detectNear();
  if(placeMode)updatePlace();
  if(removeMode&&removeHi){if(near&&near.type==='remove'){removeHi.visible=true;removeHi.position.set(near.obj.p.x,groundHeight(near.obj.p.x,near.obj.p.z)+0.07,near.obj.p.z);}else removeHi.visible=false;}
  camTarget.set(player.x,1.6+player.y,player.z);
  camera.position.lerp(new T.Vector3(player.x,13.5+player.y,player.z+19),1-Math.pow(0.001,dt));camera.lookAt(camTarget);
  updateSky(dt);
  renderer.render(scene,camera);
  }catch(e){console.error('FRAME-THROW:',e&&e.message,e&&e.stack);}
  requestAnimationFrame(frame);}
